name: Keep Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}, Time: %{time_total}s\n" https://bmsceacmwebsite.onrender.com/ping
